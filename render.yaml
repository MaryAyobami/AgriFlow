services:
  - type: web
    name: agriflow
    env: node
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: agriflow-data
      mountPath: /app/data
      sizeGB: 1
